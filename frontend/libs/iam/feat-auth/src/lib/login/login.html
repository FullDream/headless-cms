<div class="w-full max-w-md">
	<div class="rounded-2xl bg-white p-8 shadow-xl">
		<div class="mb-8 text-center">
			<h1 class="text-2xl font-semibold text-gray-900">Welcome to Headless CMS</h1>
			<p class="mt-2 text-sm text-gray-500">Sign in to continue</p>
		</div>

		<form (submit)="onLogin($event)" class="space-y-5">
			<p-float-label variant="on">
				<input pInputText id="email" class="w-full" [formField]="form.email"/>
				<label for="email">Email</label>
			</p-float-label>
			<p-float-label variant="on">
<!--				<p-password class="w-full"  inputId="password"  fluid toggleMask feedback="false" />-->
				<input pInputText id="password"  class="w-full" [formField]="form.password"/>
				<label for="password">Password</label>
			</p-float-label>

			<button pButton class="w-full" [disabled]="form().invalid()" [loading]="form().submitting()">
				Sign in
			</button>
		</form>
	</div>
</div>
