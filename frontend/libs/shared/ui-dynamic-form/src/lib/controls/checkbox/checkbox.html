@let fieldValue = field();

<div class="flex min-h-12 items-center gap-3 rounded-xl border border-surface-200 bg-surface-50 px-4 py-3">
	<p-checkbox [inputId]="fieldValue().name()" [formField]="fieldValue" binary />
	<label class="text-surface-800 text-sm font-medium" [for]="fieldValue().name()">{{ label() }}</label>
</div>
