
<form
	(submit)="submit($event)"
	class="mx-auto flex w-full max-w-7xl flex-col gap-6"
>
	<header class="flex w-full flex-col gap-4 px-2 py-1 sm:px-4">
		<div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
			<div class="flex flex-col gap-3">
				<div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:gap-5">
					<a
						[routerLink]="['../']"
						class="text-surface-600 hover:text-primary-700 hover:bg-primary-50 inline-flex w-fit items-center gap-2 rounded-full px-3 py-2 text-sm font-medium transition-colors"
					>
						<span class="pi pi-arrow-left text-xs" aria-hidden="true"></span>
						<span>Back to entries</span>
					</a>

					<div class="pt-1">
						<h1 class="text-primary-600 text-lg font-semibold tracking-[0.24em] uppercase sm:text-xl">{{ typeName() }}</h1>
					</div>
				</div>

				<p class="text-surface-500 max-w-3xl text-sm sm:text-base">
					Fill out the schema fields and save a new entry.
				</p>
			</div>

			<div class="bg-primary-50 text-primary-700 border-primary-100 inline-flex items-center self-start rounded-full border px-3 py-1 text-xs font-medium">
				{{ dynamicFormConfig().length }} fields
			</div>
		</div>
	</header>

	<section class="border-surface-200 bg-surface-0 rounded-3xl border p-5 sm:p-7">
		<div class="mb-5 flex items-center justify-between gap-3">
			<div>
				<h2 class="text-surface-800 text-lg font-semibold">Entry Data</h2>
				<p class="text-surface-500 mt-1 text-sm">Fields are generated automatically from the selected content schema.</p>
			</div>
		</div>

		<ui-dynamic-form class="grid grid-cols-1 gap-5 xl:grid-cols-2" [config]="dynamicFormConfig()" [form]="form" />

		<div class="mt-6 flex items-center justify-end border-t border-surface-200 pt-5">
			<button
				pButton
				type="submit"
				class="min-w-32"
				[disabled]="createMutation.isPending()"
				[loading]="createMutation.isPending()"
			>
				Save entry
			</button>
		</div>
	</section>
</form>
